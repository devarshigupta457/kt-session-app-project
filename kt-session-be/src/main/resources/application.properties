spring.application.name=KTSession

# Database Connection URL (Replace 'your_database_name' with your schema name)
spring.datasource.url=jdbc:mysql://localhost:3306/KTSESSION?useSSL=false&serverTimezone=UTC
# Forces the database driver to give up after 5 seconds instead of hanging forever
spring.datasource.hikari.connection-timeout=5000
spring.jpa.properties.jakarta.persistence.query.timeout=5000

spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# Database Credentials
spring.datasource.username=root
spring.datasource.password=Deva@457

# Driver and Hibernate Settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Automatically creates/updates tables in MySQL based on your @Entity classes
spring.jpa.hibernate.ddl-auto=none

# Show SQL queries in the IntelliJ console (helpful for debugging)
spring.jpa.show-sql=true
logging.level.org.springframework.security=DEBUG

