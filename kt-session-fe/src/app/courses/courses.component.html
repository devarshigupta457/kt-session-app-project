<div class="courses-wrap">
  <div class="courses-head">
    <h1>Select course and start your Learning...</h1>
  </div>

  <div class="course-grid">
    <div class="course-card" *ngFor="let course of courses" (click)="openCourse(course)">
      <button
        class="icon-btn course-fav"
        [class.added]="isInCart(course)"
        (click)="addToCart(course, $event)"
        [attr.aria-label]="isInCart(course) ? 'Remove from favourites' : 'Add to favourites'">
        <span class="icon">{{ isInCart(course) ? '★' : '☆' }}</span>
        <span class="sr-only">{{ isInCart(course) ? 'Added to favourites' : 'Add to favourites' }}</span>
      </button>
      <h3>{{ course.title }}</h3>
      <p>{{ course.description }}</p>
      <div class="course-footer">
        <span class="price">₹{{ course.price }}</span>
        <div class="course-actions">
          <button
            class="icon-btn open-btn"
            (click)="openCourse(course, $event)"
            aria-label="Open course">
            <span class="icon">▶</span>
            <span class="sr-only">Open course</span>
          </button>
          <button
            *ngIf="auth.isAdmin$ | async"
            class="icon-btn edit-btn"
            (click)="editCourse(course, $event)"
            aria-label="Edit course">
            <span class="icon">✏️</span>
            <span class="sr-only">Edit course</span>
          </button>
          <button
            *ngIf="auth.isAdmin$ | async"
            class="icon-btn delete-btn"
            (click)="deleteCourse(course, $event)"
            aria-label="Delete course">
            <span class="icon">🗑️</span>
            <span class="sr-only">Delete course</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="trending-panel" *ngIf="trendingCourses.length">
    <span class="trending-badge">🔥 Trending</span>
    <h3>Recommended for you</h3>
    <ul class="trending-list">
      <li *ngFor="let t of trendingCourses">
        <span>{{ t.title }}</span>
        <button class="icon-btn trending-open-btn" (click)="openCourse(t, $event)" aria-label="Open trending course">
          <span class="icon">🔗</span>
          <span class="sr-only">Open</span>
        </button>
      </li>
    </ul>
  </div>
</div>
