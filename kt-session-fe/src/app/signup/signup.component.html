<div class="login-wrap">
  <form class="login-form" (ngSubmit)="submit()">
    <h2>Sign Up</h2>

    <input type="text" placeholder="Username" name="username" [(ngModel)]="username" required />
    <input type="email" placeholder="Email" name="email" [(ngModel)]="email" required />
    <input type="text" placeholder="Full Name" name="fullName" [(ngModel)]="fullName" required />
    <input type="password" placeholder="Password" name="password" [(ngModel)]="password" required />
    <input type="password" placeholder="Confirm Password" name="confirmPassword" [(ngModel)]="confirmPassword" required />

    <p class="login-error" *ngIf="error">{{ error }}</p>

    <button type="submit" class="login-btn" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Sign Up' }}
    </button>
    <p class="login-alt">Already have an account? <a routerLink="/login">Login</a></p>
  </form>
</div>
